# Content Calendar — Month 1 (February/March 2026)
# Based on marketing plan Phase G1: Foundation
# Theme: Launch & Educate
#
# Growth strategy notes (from _planning/research/2026-02-21-organic-growth-strategies.md):
# - Target 3-5 tweets/day (engagement tweets fill the gaps between scheduled content)
# - Never put links in the main tweet — link goes in the FIRST REPLY
# - Content mix: 40% entertaining, 30% educational, 20% inspirational, 10% selling
# - Bluesky: cross-post all Twitter content (low effort, growing dev audience)
# - Reddit: build karma for 2-4 weeks before posting PincerPay content
# - AEO: structure blog posts with clear Q&A, original data, schema.org markup

